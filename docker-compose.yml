version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_local_dev
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=V3l0c1d@d3
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data:
    driver: local